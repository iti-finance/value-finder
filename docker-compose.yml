services:
  postgres:
    image: postgres:16-alpine

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME:-value_finder}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init.sql:/docker-entrypoint-initdb.d/01-db-init.sql:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-value_finder}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - value-finder-network

  value-finder:
    image: value-finder:latest

    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_CONFIG_STRICT_SSL: ${NPM_CONFIG_STRICT_SSL:-true}

    restart: unless-stopped

    init: true

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "127.0.0.1:${APP_PORT:-3001}:3001"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - value-finder-network

networks:
  value-finder-network:
    driver: bridge

volumes:
  postgres_data:
